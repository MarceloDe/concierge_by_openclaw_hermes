services:
  steel-api:
    image: ghcr.io/steel-dev/steel-browser-api@sha256:6b65d776e17950c804c92fa49b66b5b1a335e997786fbc2a80cc11cdd650982e
    container_name: workerprototype_steel_api_remote
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:9223:9223"
    environment:
      - DOMAIN=127.0.0.1:3000
      - CDP_DOMAIN=127.0.0.1:9223
      - LOG_STORAGE_ENABLED=true
      - LOG_STORAGE_PATH=/data/steel/logs/browser-logs.duckdb
      - SKIP_FINGERPRINT_INJECTION=true
    volumes:
      - /srv/workerprototype_openclaw/steel/logs:/data/steel/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  steel-ui:
    image: ghcr.io/steel-dev/steel-browser-ui@sha256:d356f19d0dba3297f5b3a3d431650477b20e3fe95be8b201092eda2af41e624b
    container_name: workerprototype_steel_ui_remote
    ports:
      - "127.0.0.1:5173:80"
    environment:
      - API_URL=http://steel-api:3000
    depends_on:
      steel-api:
        condition: service_healthy
    restart: unless-stopped
